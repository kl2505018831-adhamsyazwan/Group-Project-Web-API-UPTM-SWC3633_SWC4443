<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleClinic - Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; margin: 0; padding: 20px; color: white;}
        .container { max-width: 900px; margin: 0 auto; background: #ecf0f1; padding: 20px; border-radius: 8px; color: #333;}
        h1, h2 { color: #2980b9; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px;}
        button:hover { background-color: #2ecc71; }
        .btn-delete { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #bdc3c7; text-align: left; }
        th { background-color: #2980b9; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Dashboard ⚙️</h1>
    <p><strong>Note:</strong> All actions are secured by Token Authentication.</p>

    <h2>Add New Service (POST)</h2>
    <div class="form-group">
        <input type="text" id="s_name" placeholder="Service Name (e.g., Eye Test)">
        <input type="text" id="s_desc" placeholder="Description">
        <input type="number" id="s_price" placeholder="Price (RM)">
        <br><br>
        <button onclick="addService()">Add Service</button>
    </div>

    <h2>Manage Services (PUT & DELETE)</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Service Name</th>
                <th>Price (RM)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="admin-table">
            <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // The API key we inserted in Part 1 Database script
    const API_KEY = "admin_key_999"; 

    // Function to load data
    function loadServices() {
        fetch("http://localhost/teleclinic/api/services/getServices.php")
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.data.forEach(s => {
                    html += `
                        <tr>
                            <td>${s.id}</td>
                            <td>${s.service_name}</td>
                            <td>RM ${s.price}</td>
                            <td>
                                <button class="btn-edit" onclick="updateService(${s.id})">Update Price</button>
                                <button class="btn-delete" onclick="deleteService(${s.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById("admin-table").innerHTML = html;
            });
    }

    // Function to Add Service (POST)
    function addService() {
        const data = {
            service_name: document.getElementById("s_name").value,
            description: document.getElementById("s_desc").value,
            price: document.getElementById("s_price").value
        };

        fetch("http://localhost/teleclinic/api/services/addService.php", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}` // Passing API KEY!
            },
            body: JSON.stringify(data)
        }).then(res => res.json()).then(res => {
            alert(res.message);
            loadServices(); // Reload table
        });
    }

    // Function to Update Price (PUT)
    function updateService(id) {
        let newPrice = prompt("Enter new price for Service ID: " + id);
        if(newPrice) {
            fetch("http://localhost/teleclinic/api/services/updateService.php", {
                method: "PUT",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({ id: id, price: newPrice })
            }).then(res => res.json()).then(res => {
                alert(res.message);
                loadServices();
            });
        }
    }

    // Function to Delete Service (DELETE)
    function deleteService(id) {
        if(confirm("Are you sure you want to delete Service ID: " + id + "?")) {
            fetch("http://localhost/teleclinic/api/services/deleteService.php", {
                method: "DELETE",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({ id: id })
            }).then(res => res.json()).then(res => {
                alert(res.message);
                loadServices();
            });
        }
    }

    // Load initial data
    loadServices();
</script>

</body>
</html>
